<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PUBG Sensitivity</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <meta name="theme-color" content="#111111" />
  </head>

  <body>
    <!-- ================= INPUT SCREEN ================= -->
    <div id="inputScreen" class="app">
      <h1>🎮 PUBG Sensitivity</h1>

      <!-- DEVICE & PLATFORM -->
      <div class="card">
        <h2>Device & Platform</h2>

        <input
          id="phone"
          type="text"
          placeholder="Search device"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />

        <br /><br />

        <div class="toggle-group" id="platform-group">
          <button id="platform-android" class="active">Android</button>
          <button id="platform-ios">iPhone / iOS</button>
        </div>

        <br /><br />

        <!-- DEVICE DROPDOWN -->
        <div class="custom-dropdown" id="deviceDropdown">
          <div class="dropdown-selected" id="deviceSelected">
            Select your device model
          </div>
          <div class="dropdown-list" id="deviceList"></div>
        </div>
      </div>

      <!-- FPS -->
      <div class="card">
        <h2>FPS</h2>

        <div class="custom-dropdown" id="fpsDropdown">
          <div class="dropdown-selected" id="fpsSelected">60 FPS</div>

          <div class="dropdown-list" id="fpsList">
            <div class="dropdown-item" data-value="60">60 FPS</div>
            <div class="dropdown-item" data-value="90">90 FPS</div>
            <div class="dropdown-item" data-value="120">120 FPS</div>
          </div>
        </div>

        <input type="hidden" id="fps" value="60" />
      </div>

      <!-- GYROSCOPE -->
      <div class="card">
        <h2>Gyroscope</h2>

        <div class="toggle-group">
          <button id="gyro-on" class="active">ON</button>
          <button id="gyro-off">OFF</button>
        </div>
      </div>

      <!-- PLAYSTYLE -->
      <div class="card">
        <h2>Playstyle</h2>

        <div class="toggle-group">
          <button id="style-balanced" class="active">Balanced</button>
          <button id="style-aggressive">Aggressive</button>
          <button id="style-sniper">Sniper</button>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="card">
        <button id="generateBtn">🎯 Generate Sensitivity</button>
        <br /><br />
        <button id="openSavedBtn">📂 Saved Sensitivities</button>
      </div>

      <!-- SAVED LIST (UPDATED - removed card class) -->
      <div id="savedContainer" style="display: none">
        <h2>📂 Saved Sensitivities</h2>
        <div id="savedList"></div>
      </div>
    </div>

    <!-- ================= RESULT SCREEN ================= -->
    <div id="resultScreen" class="app" style="display: none">
      <h1>🎯 Your Sensitivity</h1>

      <div class="card result">
        <h2>📷 Camera</h2>
        <p id="camera"></p>
      </div>

      <div class="card result">
        <h2>🔫 ADS</h2>
        <p id="ads"></p>
      </div>

      <div class="card result">
        <h2>📱 Gyro</h2>
        <p id="gyroResult"></p>
      </div>

      <div class="card result">
        <h2>🔥 ADS Gyro</h2>
        <p id="adsGyro"></p>
      </div>

      <button id="saveBtn">💾 Save Sensitivity</button>
      <button class="reset-btn" id="resetBtn">⬅ Back</button>
    </div>

    <!-- ================= SAVE MODAL ================= -->
    <div id="saveModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <h2>Save Sensitivity</h2>

        <p id="modalMessage" style="color: #00ffcc; margin-bottom: 10px"></p>

        <input id="saveNameInput" type="text" placeholder="Enter a name..." />

        <div class="modal-buttons">
          <button id="confirmSaveBtn">Save</button>
          <button id="cancelSaveBtn" style="background: #444; color: white">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
