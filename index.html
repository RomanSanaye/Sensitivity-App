<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sensitivity Pro</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <meta name="theme-color" content="#111111" />
  </head>

  <body>
    <!-- ================= INPUT SCREEN ================= -->
    <div id="inputScreen" class="app">
      <h1>🎮 Sensitivity Pro</h1>

      <!-- DEVICE -->
      <div class="card">
        <h2>Device & Platform</h2>

        <input
          id="phone"
          type="text"
          placeholder="Search device"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />

        <br /><br />

        <div class="toggle-group" id="platform-group">
          <button
            id="platform-android"
            onclick="setPlatform('android')"
            class="active"
          >
            Android
          </button>

          <button id="platform-ios" onclick="setPlatform('ios')">
            iPhone / iOS
          </button>
        </div>

        <select id="deviceModel">
          <option value="" disabled selected hidden>
            Select your device model
          </option>
          <option value="auto">🤖 Auto-detect device (recommended)</option>
        </select>
      </div>

      <!-- FPS -->
      <div class="card">
        <h2>FPS</h2>
        <select id="fps">
          <option value="60">60 FPS</option>
          <option value="90">90 FPS</option>
          <option value="120">120 FPS</option>
        </select>
      </div>

      <!-- GYRO -->
      <div class="card">
        <h2>Gyroscope</h2>
        <div class="toggle-group">
          <button id="gyro-on" onclick="setGyro('on')" class="active">
            ON
          </button>
          <button id="gyro-off" onclick="setGyro('off')">OFF</button>
        </div>
      </div>

      <!-- PLAYSTYLE -->
      <div class="card">
        <h2>Playstyle</h2>
        <div class="toggle-group">
          <button
            id="style-balanced"
            onclick="setStyle('balanced')"
            class="active"
          >
            Balanced
          </button>
          <button id="style-aggressive" onclick="setStyle('aggressive')">
            Aggressive
          </button>
          <button id="style-sniper" onclick="setStyle('sniper')">Sniper</button>
        </div>
      </div>

      <!-- GENERATE -->
      <div class="card">
        <button onclick="generate()">🎯 Generate Sensitivity</button>
      </div>
    </div>

    <!-- ================= RESULT SCREEN ================= -->
    <div id="resultScreen" class="app" style="display: none">
      <h1>🎯 Your Sensitivity</h1>

      <div class="card result">
        <h2>📷 Camera</h2>
        <p id="camera"></p>
      </div>

      <div class="card result">
        <h2>🔫 ADS</h2>
        <p id="ads"></p>
      </div>

      <div class="card result">
        <h2>📱 Gyro</h2>
        <p id="gyroResult"></p>
      </div>

      <div class="card result">
        <h2>🔥 ADS Gyro</h2>
        <p id="adsGyro"></p>
      </div>

      <button class="reset-btn" onclick="resetApp()">🔄 Reset</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
